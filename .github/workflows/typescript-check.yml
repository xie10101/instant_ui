name: 🔍 TypeScript 类型检查

on:
  push:
    branches:
      - main
      - develop
      - master
  pull_request:
    branches:
      - main
      - develop
      - master

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 检查代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: 📥 安装 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: 📚 安装依赖
        run: pnpm install

      - name: ✅ TypeScript 类型检查
        run: pnpm build-ts

      - name: 🎉 类型检查完成
        run: echo "✅ TypeScript 类型检查通过！"
