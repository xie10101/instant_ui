/*
 此时出现一个问题 ： 清理前一次函数执行设置的计时器对象 --此对象会在宏任务队列等待执行 - 但如何做到 首次未设置计时器对象也合理执行 clear函数
-以达到规律循环- 需要一个外部变量仅在函数首次调用时被初始化-返回一个真正起效的函数使用该变量处理逻辑 - 闭包的使用  */
function test(func,num){  
let timer =null;
return  function(){ 
    clearTimeout(timer)
   timer = setTimeout(()=>{
   func()
  },num);
 return ;
}

}
